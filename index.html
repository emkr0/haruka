<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haruka - รับทำป้าย ลายน้ำ อื่นๆ</title>
    
    <!-- นำเข้า Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Anuphan', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
            background-color: #fefcff;
            position: relative;
            overflow-x: hidden;
            color: #4a3b4e;
        }

        /* Dreamy Sky Pink Glow Background */
        .sky-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 30% 70%, rgba(173, 216, 230, 0.35), transparent 60%),
                radial-gradient(circle at 70% 30%, rgba(255, 182, 193, 0.4), transparent 60%);
            pointer-events: none;
        }

        /* Liquid Glass Style */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 
                0 8px 32px 0 rgba(230, 180, 210, 0.15),
                inset 0 4px 12px rgba(255, 255, 255, 0.3);
            border-radius: 20px;
        }

        /* Banner Link & Liquid Glass Credit Bar */
        .banner-container {
            width: 100%;
            position: relative;
            overflow: hidden;
            display: block;
            text-decoration: none;
        }

        .banner-credit-bar {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            color: #7d6585;
            text-align: center;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Anuphan', sans-serif;
            letter-spacing: 0.5px;
            transition: background 0.3s, color 0.3s;
        }

        .banner-container:hover .banner-credit-bar {
            background: rgba(255, 182, 193, 0.45);
            color: #fff;
        }

        .banner-wrapper {
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }

        .banner-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .banner-container:hover .banner-img {
            transform: scale(1.02);
        }

        /* Profile Section */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -55px;
            position: relative;
            z-index: 10;
            padding: 0 20px;
        }

        .profile-img-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: white;
            box-shadow: 0 10px 25px rgba(200, 150, 180, 0.25);
            animation: float 4s ease-in-out infinite;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .shop-name {
            font-family: 'Mitr', sans-serif;
            font-size: 26px;
            color: #5c4363;
            margin: 12px 0 5px 0;
            font-weight: 500;
        }

        .shop-desc {
            font-size: 14px;
            color: #7d6585;
            margin: 0 0 35px 0;
            text-align: center;
        }

        /* Layout เมนู */
        .main-wrapper {
            max-width: 950px;
            margin: 0 auto;
            padding: 0 20px 80px 20px;
        }

        /* 2 ช่องใน 1 แถว */
        .top-featured-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        /* ช่องที่เหลือขนาดเล็กกะทัดรัดลง */
        .sub-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        /* โครงสร้างการ์ดเมนู */
        .menu-card {
            cursor: pointer;
            color: inherit;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-decoration: none; /* เอาเส้นใต้ลิงก์ออก */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 28px rgba(220, 170, 200, 0.3);
        }

        /* จัดขนาดพื้นที่รูปภาพ */
        .card-img-wrapper {
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        .top-featured-grid .card-img-wrapper {
            height: 200px;
        }

        .sub-menu-grid .card-img-wrapper {
            height: 140px;
        }

        .card-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .card-title {
            padding: 12px;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            background: rgba(255,255,255,0.3);
            border-top: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Apple Music Style Floating Music Player */
        .music-player-widget {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 100;
            width: 270px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .album-art-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art.playing {
            animation: pulseArt 2s infinite ease-in-out;
        }

        .song-info {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #333;
        }

        .song-artist {
            font-size: 11px;
            color: #ff6584;
            font-weight: 500;
            margin-top: 1px;
        }

        .play-btn {
            background: #ff6584;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 101, 132, 0.25);
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Footer */
        footer {
            padding: 35px 20px;
            background: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .contact-title {
            font-family: 'Mitr', sans-serif;
            font-size: 16px;
            margin-bottom: 18px;
            color: #5c4363;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .contact-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 12px rgba(200, 150, 180, 0.15);
            transition: transform 0.3s;
        }

        .contact-icon-btn:hover {
            transform: scale(1.1) translateY(-2px);
        }

        .closing-text {
            font-size: 13px;
            color: #8c7394;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseArt {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 101, 132, 0.4); }
            50% { transform: scale(0.96); box-shadow: 0 0 10px 3px rgba(255, 101, 132, 0.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 101, 132, 0); }
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 600px) {
            .top-featured-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .sub-menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .music-player-widget {
                bottom: 15px; left: 15px; right: 15px;
                width: auto;
            }
            .main-wrapper {
                padding-bottom: 90px;
            }
        }
    </style>
</head>
<body>

    <div class="sky-background"></div>

    <!-- ส่วนหัว: Banner Link -->
    <a href="https://www.facebook.com/share/p/1EuSyq6iZe/?mibextid=wwXIfr" target="_blank" class="banner-container">
        <div class="banner-credit-bar">กดเพื่อดูเครดิตร้าน</div>
        <div class="banner-wrapper">
            <img src="https://i.postimg.cc/8CQnspcV/mi-m-ch-x-614-20260627142737.png" alt="Shop Banner" class="banner-img">
        </div>
    </a>

    <!-- ข้อมูลร้าน -->
    <div class="profile-section">
        <div class="profile-img-wrapper">
            <img src="https://i.postimg.cc/VkS3dZR1/โปรไฟล์.png" alt="Haruka Profile" class="profile-img">
        </div>
        <h1 class="shop-name">Haruka</h1>
        <p class="shop-desc">รับทำป้าย ลายน้ำ อื่นๆ สอบถามก่อนได้ค่ะ</p>
    </div>

    <!-- พื้นที่จัดแสดงเมนูทั้งหมด -->
    <div class="main-wrapper">
        
        <!-- คู่ที่ 1: แถวบนขนาดใหญ่สไตล์โดดเด่น (เปิดแท็บใหม่) -->
        <div class="top-featured-grid">
            <a href="https://drive.google.com/drive/folders/1X3tvQc6_Poc9Q523mN3CQaOM3t3xltPp" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/vZ1pc2vh/1.png" alt="ตัวอย่างผลงาน" class="card-img">
                </div>
                <div class="card-title">ตัวอย่างผลงาน</div>
            </a>

            <a href="https://drive.google.com/drive/folders/1zSVCU9dpghegGbHj0IhEaDjeyNO_wT0j" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/4xKrm21L/2.png" alt="งานปล่อยเอฟ" class="card-img">
                </div>
                <div class="card-title">งานปล่อยเอฟ</div>
            </a>
        </div>

        <!-- กลุ่มที่ 2: ช่องอื่นๆ ด้านล่าง (เปิดแท็บใหม่) -->
        <div class="sub-menu-grid">
            <a href="https://drive.google.com/drive/folders/1epMHB0WTgYSCbrSHronJbJpI9wKrf6R0" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/wjtS74kw/3.png" alt="เลือกบล็อก" class="card-img">
                </div>
                <div class="card-title">เลือกบล็อก</div>
            </a>

            <a href="https://drive.google.com/drive/folders/1JqBLajnCWnw0pGwsdy_UfSqUgTeUUikd" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/pL9gpcB0/4.png" alt="เลือกตูน" class="card-img">
                </div>
                <div class="card-title">เลือกตูน</div>
            </a>

            <a href="https://drive.google.com/drive/folders/1ZM_69S2KLLvY17wgqjgY1UhRriEZN83G" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/K8KdRpN2/5.png" alt="เลือกของตกแต่ง" class="card-img">
                </div>
                <div class="card-title">เลือกของตกแต่ง</div>
            </a>

            <a href="https://drive.google.com/drive/folders/1g-dgOK49QZW8v9GN8tyi_Gn7_7F19gfu" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/VkS3dZFH/6.png" alt="เลือกแนวฟอนต์/หัวป้าย" class="card-img">
                </div>
                <div class="card-title">เลือกแนวฟอนต์/หัวป้าย</div>
            </a>

            <a href="https://drive.google.com/drive/folders/1xCZVqeQqkDlbj5ID0kbvxyR8STbihTr_" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/SxXwJ1rp/7.png" alt="เลือกฟอนต์" class="card-img">
                </div>
                <div class="card-title">เลือกฟอนต์</div>
            </a>

            <!-- ช่อง: รายละเอียดทั้งหมดของร้าน -->
            <a href="https://drive.google.com/drive/folders/1iS7eX1nNdB9g773IPBtFT8J1J7QFXskS" target="_blank" class="menu-card liquid-glass">
                <div class="card-img-wrapper">
                    <img src="https://i.postimg.cc/RZSbtSzN/IMG-5425.jpg" alt="รายละเอียดทั้งหมดของร้าน" class="card-img">
                </div>
                <div class="card-title">รายละเอียดทั้งหมดของร้าน</div>
            </a>
        </div>

    </div>

    <!-- Apple Music Style Floating Music Player -->
    <div class="music-player-widget liquid-glass">
        <div class="album-art-wrapper">
            <img src="https://i.postimg.cc/QMWCJrQZ/IMG-5578.jpg" alt="Play Date Cover" class="album-art" id="player-art">
        </div>
        <div class="song-info">
            <span class="song-title">Play Date 🫧</span>
            <span class="song-artist">Melanie Martinez</span>
        </div>
        <div class="player-controls">
            <button class="play-btn" id="music-toggle-btn" title="Play/Pause">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </div>

    <!-- แท็กสตรีมมิ่งไฟล์เพลงโดยตรง -->
    <audio id="audio-player" loop preload="auto">
        <source src="https://archive.org/download/melaniemartinezplaydate/Melanie%20Martinez%20-%20Play%20Date.mp3" type="audio/mpeg">
    </audio>

    <!-- ช่องทางติดต่อด้านล่างสุด -->
    <footer>
        <div class="contact-title">ช่องทางการติดต่อสอบถาม</div>
        <div class="contact-links">
            <a href="https://www.facebook.com/share/1JaTYw8S9B/?mibextid=wwXIfr" target="_blank" class="contact-icon-btn">
                <img src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/facebook/default.svg" alt="Facebook" width="22" height="22" />
            </a>
            <a href="https://line.me/ti/p/Z4nBI108Gc" target="_blank" class="contact-icon-btn">
                <img src="https://cdn.jsdelivr.net/gh/glincker/thesvg@main/public/icons/line/default.svg" alt="LINE" width="22" height="22" />
            </a>
        </div>
        <p class="closing-text">ขอบคุณสำหรับทุกการสนับสนุนค่ะ @haruka_</p>
    </footer>

    <!-- Script ควบคุมเพลง -->
    <script>
        const audioPlayer = document.getElementById('audio-player');
        const toggleBtn = document.getElementById('music-toggle-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const albumArt = document.getElementById('player-art');

        toggleBtn.addEventListener('click', function() {
            if (audioPlayer.paused) {
                audioPlayer.play().then(() => {
                    playIcon.style.display = 'none';
                    pauseIcon.style.display = 'block';
                    albumArt.classList.add('playing');
                }).catch(error => {
                    console.log("Playback ถูกบล็อกชั่วคราว:", error);
                });
            } else {
                audioPlayer.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                albumArt.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
