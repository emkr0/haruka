<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dreamy Space</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Flaticon UI Icons CDN (สำหรับไอคอน Facebook และ Line) -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-brands/css/uicons-brands.css'>
    
    <style>
        /* ลื่นไหลเวลากด Scroll และเอฟเฟกต์สมูทๆ เด้งๆ */
        html {
            scroll-behavior: smooth;
        }
        
        /* สไตล์ Liquid Glass (กระจกวาวๆ นุ่มๆ มีเงาฟุ้งๆ) */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 8px 32px 0 rgba(255, 182, 193, 0.2),
                inset 0 4px 12px 0 rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* ฟีลสปริงเด้งดึ๋งนุ่มๆ */
        }

        /* เอฟเฟกต์การเอาเมาส์ชี้กล่องเบนโตะ ให้เด้งและสว่างวาบขึ้น */
        .bento-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 
                0 15px 45px 0 rgba(173, 216, 230, 0.4),
                inset 0 4px 20px 0 rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.7);
        }

        /* แอนิเมชันเปิดหน้าเว็บแรกเริ่มแบบนุ่มฟู */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="m-0 p-0 antialiased selection:bg-pink-200">

    <!-- พื้นหลังของคุณ (Dreamy Sky Pink Glow) -->
    <div class="min-h-screen w-full bg-[#fefcff] relative overflow-x-hidden flex flex-col justify-between">
        <div
            class="absolute inset-0 z-0 pointer-events-none"
            style="background-image: 
                radial-gradient(circle at 30% 70%, rgba(173, 216, 230, 0.35), transparent 60%),
                radial-gradient(circle at 70% 30%, rgba(255, 182, 193, 0.4), transparent 60%);"
        ></div>

        <!-- CONTENT ZONE -->
        <div class="relative z-10 w-full">
            
            <!-- 1. Banner Link ด้านบนสุด -->
            <a href="https://www.facebook.com/share/p/1EuSyq6iZe/?mibextid=wwXIfr" target="_blank" class="block w-full h-[250px] md:h-[380px] overflow-hidden relative group cursor-pointer shadow-md">
                <img src="เครดิต.PNG" alt="Banner" class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105">
                <!-- แสงเงาวาวๆ เวลา hover บนแบนเนอร์ -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            </a>

            <!-- 2. Profile Image (วางกึ่งกลาง คาบเกี่ยวขอบแบนเนอร์ลงมา) -->
            <div class="flex justify-center -mt-16 md:[-mt-24] relative z-20 animate-fade-up">
                <div class="w-32 h-32 md:w-44 md:h-44 rounded-full p-1.5 bg-white/60 backdrop-blur-md shadow-lg border border-white/40 overflow-hidden transition-transform duration-500 hover:rotate-3">
                    <img src="โปรไฟล์.PNG" alt="Profile" class="w-full h-full object-cover rounded-full">
                </div>
            </div>

            <!-- 3. Bento Box Layout หน้าเว็บหลัก -->
            <div class="max-w-6xl mx-auto px-4 my-12 animate-fade-up" style="animation-delay: 0.2s;">
                
                <!-- การจัดกริดแบบ Bento Box (ผสมช่องใหญ่ ช่องเล็ก ให้ดูมีมิติ) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 auto-rows-[160px]">
                    
                    <!-- บล็อก 1: ตัวอย่างผลงาน (ขนาดใหญ่กว้าง 2 ช่อง) -->
                    <a href="https://drive.google.com/drive/folders/1X3tvQc6_Poc9Q523mN3CQaOM3t3xltPp" target="_blank" 
                       class="liquid-glass bento-card sm:col-span-2 row-span-2 p-6 flex flex-col justify-between group">
                        <div class="flex justify-between items-start">
                            <span class="text-xs font-bold tracking-wider text-pink-400 bg-pink-50 px-3 py-1 rounded-full border border-pink-100">PORTFOLIO</span>
                            <div class="w-10 h-10 rounded-full bg-white/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">🚀</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <img src="1.PNG" alt="Icon 1" class="w-16 h-16 object-contain drop-shadow-sm">
                            <div>
                                <h3 class="text-xl font-bold text-gray-700">ตัวอย่างผลงาน</h3>
                                <p class="text-xs text-gray-500 mt-1">รวมผลงานการดีไซน์และสเปซทั้งหมด</p>
                            </div>
                        </div>
                    </a>

                    <!-- บล็อก 2: งานปล่อยเอฟ (ช่องธรรมดา) -->
                    <a href="https://drive.google.com/drive/folders/1zSVCU9dpghegGbHj0IhEaDjeyNO_wT0j" target="_blank" 
                       class="liquid-glass bento-card p-6 flex flex-col justify-between">
                        <img src="2.PNG" alt="Icon 2" class="w-12 h-12 object-contain self-start">
                        <h3 class="text-base font-bold text-gray-700 mt-2">งานปล่อยเอฟ</h3>
                    </a>

                    <!-- บล็อก 3: เลือกบล็อก (ช่องธรรมดา) -->
                    <a href="https://drive.google.com/drive/folders/1epMHB0WTgYSCbrSHronJbJpI9wKrf6R0" target="_blank" 
                       class="liquid-glass bento-card p-6 flex flex-col justify-between">
                        <img src="3.PNG" alt="Icon 3" class="w-12 h-12 object-contain self-start">
                        <h3 class="text-base font-bold text-gray-700 mt-2">เลือกบล็อก</h3>
                    </a>

                    <!-- บล็อก 4: เลือกตูน (ขนาดสูง 2 ช่องแนวดิ่ง) -->
                    <a href="https://drive.google.com/drive/folders/1JqBLajnCWnw0pGwsdy_UfSqUgTeUUikd" target="_blank" 
                       class="liquid-glass bento-card row-span-2 p-6 flex flex-col justify-between group">
                        <div class="flex flex-col gap-3">
                            <img src="4.PNG" alt="Icon 4" class="w-16 h-16 object-contain">
                            <h3 class="text-lg font-bold text-gray-700">เลือกตูน</h3>
                        </div>
                        <span class="text-xs text-blue-400 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 self-start">Click to open ✨</span>
                    </a>

                    <!-- บล็อก 5: เลือกของตกแต่ง (ช่องธรรมดา) -->
                    <a href="https://drive.google.com/drive/folders/1ZM_69S2KLLvY17wgqjgY1UhRriEZN83G" target="_blank" 
                       class="liquid-glass bento-card p-6 flex flex-col justify-between">
                        <img src="5.PNG" alt="Icon 5" class="w-12 h-12 object-contain self-start">
                        <h3 class="text-base font-bold text-gray-700 mt-2">เลือกของตกแต่ง</h3>
                    </a>

                    <!-- บล็อก 6: เลือกแนวฟอนต์/หัวป้าย (ขนาดใหญ่กว้าง 2 ช่อง) -->
                    <a href="https://drive.google.com/drive/folders/1g-dgOK49QZW8v9GN8tyi_Gn7_7F19gfu" target="_blank" 
                       class="liquid-glass bento-card sm:col-span-2 p-6 flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <img src="6.PNG" alt="Icon 6" class="w-14 h-14 object-contain">
                            <div>
                                <h3 class="text-base font-bold text-gray-700">เลือกแนวฟอนต์ / หัวป้าย</h3>
                                <p class="text-xs text-gray-400">ดีไซน์หัวป้ายเก๋ๆ หลากหลายสไตล์</p>
                            </div>
                        </div>
                        <span class="text-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300">💖</span>
                    </a>

                    <!-- บล็อก 7: เลือกฟอนต์ (ช่องธรรมดา) -->
                    <a href="https://drive.google.com/drive/folders/1xCZVqeQqkDlbj5ID0kbvxyR8STbihTr_" target="_blank" 
                       class="liquid-glass bento-card p-6 flex flex-col justify-between">
                        <img src="7.PNG" alt="Icon 7" class="w-12 h-12 object-contain self-start">
                        <h3 class="text-base font-bold text-gray-700 mt-2">เลือกฟอนต์</h3>
                    </a>

                </div>
            </div>
        </div>

        <!-- 4. Contact Footer ด้านล่างสุด -->
        <footer class="relative z-20 w-full py-8 mt-12 bg-white/30 backdrop-blur-md border-t border-white/30 text-center">
            <p class="text-sm font-medium text-gray-500 mb-4 tracking-wide">CONNECT WITH ME</p>
            <div class="flex justify-center gap-6">
                
                <!-- Facebook -->
                <a href="https://www.facebook.com/share/1JaTYw8S9B/?mibextid=wwXIfr" target="_blank" 
                   class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/60 hover:bg-[#1877F2]/10 text-gray-600 hover:text-[#1877F2] border border-white/50 shadow-sm transition-all duration-300 hover:-translate-y-1">
                    <i class="fi fi-brands-facebook text-xl flex items-center"></i>
                    <span class="text-sm font-bold">Facebook</span>
                </a>

                <!-- Line -->
                <a href="https://line.me/ti/p/Z4nBI108Gc" target="_blank" 
                   class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/60 hover:bg-[#06C755]/10 text-gray-600 hover:text-[#06C755] border border-white/50 shadow-sm transition-all duration-300 hover:-translate-y-1">
                    <i class="fi fi-brands-line-circle text-xl flex items-center"></i>
                    <span class="text-sm font-bold">Line</span>
                </a>

            </div>
            <p class="text-xs text-gray-400 mt-6">&copy; 2026 Crafted with ❤️ for your sweet space</p>
        </footer>

    </div>
</body>
</html>
